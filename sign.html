<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Offer Letter</title>
<style>
  @font-face { font-family: "SigDancing"; src: url("/fonts/dancing-script.woff2") format("woff2"); font-display: swap; }
  @font-face { font-family: "SigVibes"; src: url("/fonts/great-vibes.woff2") format("woff2"); font-display: swap; }
  @font-face { font-family: "SigSacramento"; src: url("/fonts/sacramento.woff2") format("woff2"); font-display: swap; }
  @font-face { font-family: "SigApple"; src: url("/fonts/homemade-apple.woff2") format("woff2"); font-display: swap; }
  :root {
    --blue: #1f5fa8;
    --canvas: #f6f6f4;
    --card: #fff;
    --line: #e7e7e4;
    --text: #1c1c1c;
    --muted: #8a8a8a;
    --accent: #1f5fa8;
    --accent-dark: #17497f;
    --accent-tint: #eef4fb;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 10px 30px rgba(0,0,0,.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    color: var(--text);
    background: var(--canvas);
  }
  .wrap { max-width: 900px; margin: 0 auto; padding: 24px 12px 60px; }
  .banner {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 14px 18px;
    font-size: 14px;
    margin-bottom: 18px;
  }
  .banner.signed { border-color: #bcd7bc; background: #f2f8f2; }

  /* ---------- LETTER SHEET (mirrors the app's offer letter styles) ---------- */
  .sheet {
    background: #fff;
    width: 8.5in;
    min-height: 11in;
    margin: 0 auto;
    border-radius: 12px;
    box-shadow: var(--shadow);
    font-family: "Helvetica Neue", Arial, sans-serif;
    zoom: var(--sheet-zoom, 1);
    padding: 0;
    display: flex;
    flex-direction: column;
    color: #4a4a4a;
    font-size: 12px;
    line-height: 1.55;
  }
  .ol-inner { padding: .55in .65in 0; flex: 1 0 auto; }
  .ol-logo {
    text-align: right;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: .5px;
    color: #1a1a1a;
    margin-bottom: 34px;
  }
  .ol-logo span { color: var(--blue); }
  .ol-logo img { height: 44px; width: auto; vertical-align: bottom; }
  .ol-body p { margin-bottom: 12px; }
  .ol-dear { margin-top: 2px; font-weight: 700; }
  .ol-body ul { margin: 0 0 12px 22px; }
  .ol-body li { margin-bottom: 3px; }
  .ol-sign-row { display: flex; justify-content: space-between; margin-top: 6px; }
  .ol-sign-row > div > div { margin-bottom: 5px; }
  .ol-sign { font-size: 18px; font-weight: 700; color: var(--blue); }
  .ol-sign-right { min-width: 2.1in; }
  .ol-footer {
    background: #3f7cb8;
    color: #fff;
    text-align: center;
    padding: 13px 16px;
    font-size: 11px;
    margin-top: 34px;
  }
  .sig-script { font-size: 30px; line-height: 1.1; color: #1c2b4a; margin: 6px 0 4px; }
  .sig-typed { color: #4a4a4a; }
  .font-dancing { font-family: "SigDancing", cursive; }
  .font-vibes { font-family: "SigVibes", cursive; }
  .font-sacramento { font-family: "SigSacramento", cursive; }
  .font-apple { font-family: "SigApple", cursive; font-size: 22px; }

  /* ---------- SIGN PANEL ---------- */
  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 24px;
    margin: 22px auto 0;
    max-width: 620px;
  }
  .panel h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .panel .sub { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 5px; }
  input[type="text"] {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    font-family: inherit;
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  input[type="text"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-tint); }
  .sig-preview {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fbfbfa;
    min-height: 92px;
    display: flex;
    align-items: center;
    padding: 8px 18px;
    overflow: hidden;
  }
  .sig-preview .ink {
    font-size: 38px;
    line-height: 1.1;
    color: #1c2b4a;
    white-space: nowrap;
  }
  .sig-preview .placeholder { font-size: 13px; color: var(--muted); font-family: inherit; }
  .font-choices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 8px; }
  .font-opt {
    border: 1px solid var(--line);
    border-radius: 9px;
    background: var(--card);
    padding: 8px 10px;
    cursor: pointer;
    text-align: center;
    font-size: 24px;
    line-height: 1.15;
    color: #1c2b4a;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .font-opt.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-tint); }
  .font-opt .nm { display: block; font-family: -apple-system, sans-serif; font-size: 10px; color: var(--muted); margin-top: 2px; }
  .agree { display: flex; gap: 9px; align-items: flex-start; margin-top: 16px; font-size: 13px; line-height: 1.5; }
  .agree input { margin-top: 2px; }
  .btn {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    background: var(--card);
    cursor: pointer;
  }
  .btn:hover { background: #f4f6f9; }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
    width: 100%;
    margin-top: 18px;
    padding: 13px;
    font-size: 14px;
  }
  .btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .btn-primary:disabled { opacity: .6; cursor: default; }
  .err { color: #c00000; font-size: 13px; margin-top: 10px; display: none; }

  @media (max-width: 640px) {
    .wrap { padding: 12px 8px 40px; }
    .panel { padding: 18px 14px; }
  }

  /* ---------- PRINT ---------- */
  @media print {
    body { background: #fff; }
    .wrap { padding: 0; max-width: none; }
    .banner, .panel { display: none !important; }
    .sheet {
      box-shadow: none;
      border-radius: 0;
      zoom: 1;
      width: auto;
      margin: 0;
      min-height: 11in;
    }
    @page { size: letter; margin: 0; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="banner" id="banner">Loading letter…</div>

  <div class="sheet" id="sheet" hidden>
    <div id="letterHtml" style="display:flex;flex-direction:column;flex:1 0 auto"></div>
    <div class="ol-footer" id="footerBar" hidden></div>
  </div>

  <div class="panel" id="signPanel" hidden>
    <h2>Review &amp; sign</h2>
    <div class="sub">Please read the letter above carefully. To accept this offer, complete the fields below.</div>

    <label>Type your full legal name</label>
    <input type="text" id="typedName" placeholder="First Last" autocomplete="name">

    <label>Your signature</label>
    <div class="sig-preview"><span class="ink" id="sigInk"><span class="placeholder">Type your name above to see your signature</span></span></div>
    <div class="font-choices" id="fontChoices"></div>

    <div class="agree">
      <input type="checkbox" id="agree">
      <label for="agree" style="margin:0;font-size:13px;color:var(--text)">I have read this offer letter, and by signing I accept the position and its terms.</label>
    </div>

    <button class="btn-primary btn" id="signBtn">Sign &amp; submit</button>
    <div class="err" id="errMsg"></div>
  </div>

  <div class="panel" id="donePanel" hidden>
    <h2>Signed ✓</h2>
    <div class="sub" id="doneSub"></div>
    <button class="btn-primary btn" onclick="window.print()">Save as PDF / Print</button>
  </div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const id = (location.hash || "").replace(/^#/, "");
  const banner = $("banner");

  // opening a different letter link in the same tab only changes the hash;
  // reload so the new letter is fetched and rendered from scratch
  window.addEventListener("hashchange", () => location.reload());

  if (!/^[a-f0-9]{32}$/.test(id)) {
    banner.textContent = "This link is not valid. Please check that you copied the full link.";
    return;
  }

  const fmtDate = iso => new Date(iso).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });

  /* the letter HTML comes from storage; the create endpoint is unauthenticated,
     so strip anything script-capable before rendering */
  function sanitizeHtml(html) {
    const doc = new DOMParser().parseFromString(html, "text/html");
    doc.querySelectorAll("script,iframe,object,embed,link,meta,base,form,style").forEach(el => el.remove());
    doc.querySelectorAll("*").forEach(el => {
      [...el.attributes].forEach(a => {
        const n = a.name.toLowerCase();
        const v = a.value.trim().toLowerCase();
        if (n.startsWith("on")) el.removeAttribute(a.name);
        else if ((n === "href" || n === "src" || n === "xlink:href") && v.startsWith("javascript:")) el.removeAttribute(a.name);
        else if (n === "src" && v.startsWith("data:") && !v.startsWith("data:image/")) el.removeAttribute(a.name);
      });
    });
    return doc.body.innerHTML;
  }

  /* fit the 8.5in sheet to narrow screens */
  const SHEET_W = 816;
  function fitSheet() {
    const z = Math.min(1, (document.querySelector(".wrap").clientWidth) / SHEET_W);
    $("sheet").style.setProperty("--sheet-zoom", z);
  }
  window.addEventListener("resize", fitSheet);

  /* signature fonts — keys are stored on the record; the app and server share
     this allowlist so only known font classes are ever applied */
  const FONTS = [
    { key: "dancing", cls: "font-dancing", label: "Dancing" },
    { key: "vibes", cls: "font-vibes", label: "Elegant" },
    { key: "sacramento", cls: "font-sacramento", label: "Casual" },
    { key: "apple", cls: "font-apple", label: "Handwritten" }
  ];
  const fontClass = key => (FONTS.find(f => f.key === key) || FONTS[0]).cls;
  let chosenFont = FONTS[0].key;

  function showSigned(rec) {
    banner.className = "banner signed";
    banner.textContent = `Signed by ${rec.typedName} on ${fmtDate(rec.signedAt)}.`;
    // embed the signature in the letter's signature block; built with DOM APIs
    // (not an HTML string) so stored values can't inject markup
    let right = $("letterHtml").querySelector(".ol-sign-right");
    if (!right) {
      right = document.createElement("div");
      right.className = "ol-sign-right";
      $("letterHtml").appendChild(right);
    }
    right.textContent = "";
    const lbl = document.createElement("div");
    lbl.textContent = "Signature:";
    const sig = document.createElement("div");
    sig.className = "sig-script " + fontClass(rec.signatureFont);
    sig.textContent = rec.signatureText || rec.typedName;
    const typed = document.createElement("div");
    typed.className = "sig-typed";
    typed.textContent = `(${rec.typedName})`;
    const dt = document.createElement("div");
    dt.textContent = "Date: " + new Date(rec.signedAt).toLocaleDateString("en-US");
    right.append(lbl, sig, typed, dt);
    $("signPanel").hidden = true;
    $("doneSub").textContent = `This offer letter was signed by ${rec.typedName} on ${fmtDate(rec.signedAt)}. You can save it as a PDF for your records.`;
    $("donePanel").hidden = false;
    document.title = `${rec.name.replace(/\s+/g, "")}_OfferLetter_Signed`;
  }

  /* ---------- signature font picker + live preview ---------- */
  function updatePreview() {
    const name = $("typedName").value.trim();
    const ink = $("sigInk");
    ink.className = "ink " + fontClass(chosenFont);
    if (name) ink.textContent = name;
    else ink.innerHTML = '<span class="placeholder">Type your name above to see your signature</span>';
    // reflect the typed name in each font choice tile
    document.querySelectorAll(".font-opt").forEach(opt => {
      opt.firstChild.textContent = name || opt.dataset.label;
    });
  }
  function initFontPicker() {
    const wrap = $("fontChoices");
    FONTS.forEach(f => {
      const opt = document.createElement("button");
      opt.type = "button";
      opt.className = "font-opt " + f.cls + (f.key === chosenFont ? " active" : "");
      opt.dataset.label = f.label;
      const txt = document.createTextNode(f.label);
      const nm = document.createElement("span");
      nm.className = "nm";
      nm.textContent = f.label;
      opt.append(txt, nm);
      opt.addEventListener("click", () => {
        chosenFont = f.key;
        document.querySelectorAll(".font-opt").forEach(o => o.classList.remove("active"));
        opt.classList.add("active");
        updatePreview();
      });
      wrap.appendChild(opt);
    });
    $("typedName").addEventListener("input", updatePreview);
    updatePreview();
  }

  function fail(msg) {
    const e = $("errMsg");
    e.textContent = msg;
    e.style.display = "block";
  }

  async function submit(rec) {
    const typedName = $("typedName").value.trim();
    $("errMsg").style.display = "none";
    if (!typedName) return fail("Please type your full name.");
    if (!$("agree").checked) return fail("Please check the box to confirm you accept the offer.");
    const btn = $("signBtn");
    btn.disabled = true;
    btn.textContent = "Submitting…";
    try {
      const r = await fetch("/api/letter", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "sign", id, typedName, signatureText: typedName, signatureFont: chosenFont })
      });
      if (!r.ok) {
        const j = await r.json().catch(() => ({}));
        throw new Error(j.error || "submit failed");
      }
      const rec2 = await (await fetch(`/api/letter?id=${id}`)).json();
      showSigned(rec2);
      window.scrollTo({ top: 0, behavior: "smooth" });
    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Sign & submit";
      fail("Could not submit: " + err.message + ". Please try again.");
    }
  }

  /* ---------- load ---------- */
  (async () => {
    let rec;
    try {
      const r = await fetch(`/api/letter?id=${id}`);
      if (r.status === 404) { banner.textContent = "This letter is no longer available."; return; }
      if (!r.ok) throw new Error();
      rec = await r.json();
    } catch {
      banner.textContent = "Could not load the letter. Please try again in a moment.";
      return;
    }
    $("letterHtml").innerHTML = sanitizeHtml(rec.html);
    if (rec.footer) { $("footerBar").textContent = rec.footer; $("footerBar").hidden = false; }
    $("sheet").hidden = false;
    fitSheet();
    if (rec.status === "signed") {
      showSigned(rec);
    } else {
      banner.textContent = `Hi${rec.name ? " " + rec.name : ""}! Please review your offer letter below, then sign at the bottom of the page.`;
      $("signPanel").hidden = false;
      initFontPicker();
      $("signBtn").addEventListener("click", () => submit(rec));
      document.title = `${rec.name.replace(/\s+/g, "")}_OfferLetter`;
    }
  })();
})();
</script>
</body>
</html>
